name: build

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        node: ["22", "24"]
        os: [ubuntu-latest, macOS-latest, windows-latest]
    name: node.js ${{ matrix.node }} test in ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
          registry-url: "https://registry.npmjs.org"

      - name: Cache SQLite3 binaries
        uses: actions/cache@v3
        with:
          path: bin/
          key: sqlite3-${{ matrix.os }}-${{ hashFiles('script/download-sqlite3.js') }}

      - name: Install
        run: npm i

      - name: Test
        run: npm run test

      - name: Benchmark
        run: npm run benchmark
